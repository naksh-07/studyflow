name = "studyflow"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
workers_dev = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

[placement]
mode = "smart"


[vars]
# Placeholders for non-sensitive application parameters.
# Sensitive secrets must be set via wrangler secrets or Cloudflare dashboard.
NEXT_PUBLIC_STUDYFLOW_API_URL = "https://studyflow.riyasaksena502.workers.dev"
NEXT_PUBLIC_STUDYFLOW_APP_URL = "https://studyflow.riyasaksena502.workers.dev"
GOOGLE_CLIENT_ID = "857658557594-dckfh44808tvoa6mr58vjftnbqig0usp.apps.googleusercontent.com"

[[d1_databases]]
binding = "DB"
database_name = "studyflow_db"
database_id = "8fc362c8-d0ce-462c-9ecb-ed28367272cf"
migrations_dir = "db/migrations"